{% extends 'base.html' %}
{% block title %}Create Order | CHA{% endblock %}
{% block page_title %}Create Medical Order{% endblock %}
{% block content %}
<div style="max-width:700px">
    <div class="card">
        <div class="card-title">New medical order</div>
        <form method="post">
            {% csrf_token %}
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Patient</label>
                    <select name="patient" class="form-control" required>
                        <option value="">Select patient...</option>
                        {% for p in form.fields.patient.queryset %}
                        <option value="{{ p.id }}" {% if form.patient.value|stringformat:'s' == p.id|stringformat:'s' %}selected{% endif %}>{{ p.get_full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Order Type</label>
                    <select name="order_type" class="form-control" required>
                        {% for value, label in form.fields.order_type.choices %}
                        <option value="{{ value }}" {% if form.order_type.value == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-control">
                        {% for value, label in form.fields.priority.choices %}
                        <option value="{{ value }}" {% if form.priority.value|default:'normal' == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Department</label>
                    <select name="department" class="form-control">
                        <option value="">Auto-assign</option>
                        {% for d in form.fields.department.queryset %}
                        <option value="{{ d.id }}" {% if form.department.value|stringformat:'s' == d.id|stringformat:'s' %}selected{% endif %}>{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Clinical Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Clinical reason for this order, relevant history..." required>{{ form.description.value|default:'' }}</textarea>
            </div>
            <div style="display:flex;gap:12px">
                <button type="submit" class="btn btn-primary">Create order</button>
                <a href="{% url 'doctor_orders' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
