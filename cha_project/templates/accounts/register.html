{% extends 'base.html' %}
{% block title %}Register | CHA{% endblock %}
{% block public_content %}
<div class="public-page">
    <div class="public-card" style="max-width:560px">
        <h1 style="margin-top:0;margin-bottom:8px;font-size:28px">Register</h1>
        <p style="margin-top:0;margin-bottom:20px;color:var(--muted)">
            Patient and doctor accounts require administrator approval.
        </p>

        {% for msg in messages %}
        <div class="alert alert-error">{{ msg }}</div>
        {% endfor %}

        <form method="post">
            {% csrf_token %}
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" value="{{ form.username.value|default:'' }}" required>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" value="{{ form.email.value|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" value="{{ form.phone.value|default:'' }}">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" minlength="8" required>
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <select name="role">
                    <option value="patient" {% if form.role.value|default:'patient' == 'patient' %}selected{% endif %}>Patient</option>
                    <option value="doctor" {% if form.role.value == 'doctor' %}selected{% endif %}>Doctor</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Submit</button>
        </form>

        <p style="margin-top:18px;margin-bottom:0;font-size:14px;color:var(--muted)">
            Already registered? <a href="{% url 'login' %}">Go to login</a>
        </p>
    </div>
</div>
{% endblock %}
