{% extends 'base.html' %}
{% block title %}Login | CHA{% endblock %}
{% block public_content %}
<div class="public-page">
    <div class="public-card">
        <h1 style="margin-top:0;margin-bottom:8px;font-size:28px">CHA Login</h1>
        <p style="margin-top:0;margin-bottom:20px;color:var(--muted)">Sign in to access the medical management system.</p>

        {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}error{% elif msg.tags == 'warning' %}warning{% else %}success{% endif %}">
            {{ msg }}
        </div>
        {% endfor %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" value="{{ form.username.value|default:'' }}" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
        </form>

        <p style="margin-top:18px;margin-bottom:0;font-size:14px;color:var(--muted)">
            No account? <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
